steps:
  # Build the container image (linux/amd64 for Cloud Run)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrisakti-v3:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutrisakti-v3:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutrisakti-v3:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nutrisakti-v3:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nutrisakti-v3'
      - '--image=gcr.io/$PROJECT_ID/nutrisakti-v3:$SHORT_SHA'
      - '--region=asia-southeast2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/nutrisakti-v3:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/nutrisakti-v3:latest'

substitutions:
  _REGION: asia-southeast2
